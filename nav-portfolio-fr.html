<script>
(function () {
    var page = window.location.pathname.split('/').pop();

    if (!page || page === '') {
        page = 'index.html';
    }

    var enPage;
    var frPage;

    if (page === 'index.html') {
        frPage = 'index.html';
        enPage = 'index-en.html';
    }
    else if (page === 'index-en.html') {
        frPage = 'index.html';
        enPage = 'index-en.html';
    }
    else if (page.endsWith('-fr.html')) {
        frPage = page;
        enPage = page.replace('-fr.html', '.html');
    }
    else {
        frPage = page.replace('.html', '-fr.html');
        enPage = page;
    }

    document.getElementById('language-link-fr').href = frPage;
    document.getElementById('language-link-en').href = enPage;
})();
</script>
